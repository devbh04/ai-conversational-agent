    "google-api-python-client>=2.190.0",
    "google-auth>=2.48.0",
    "google-auth-httplib2>=0.3.0",
    # ── Core utilities ──
    "python-dotenv>=1.2.1",
    "certifi>=2026.1.4",
    "pytz>=2025.2",
    "pydantic>=2.12.5",
    "aiohttp>=3.13.3",
    "aiofiles>=25.1.0",
    "nest-asyncio>=1.6.0",
    "numpy>=2.4.2",
    "onnxruntime>=1.24.1",
    "pillow>=12.1.1",
    "regex>=2026.2.19",
    "rich>=14.3.2",
    "watchfiles>=1.1.1",
    "livekit-plugins-google>=1.5.14",
]
