[project]
name = "inbound-ai-voice"
version = "1.0.0"
description = "LiveKit AI Voice Agent with FastAPI backend"
requires-python = ">=3.11"
dependencies = [
    # ── LiveKit ──
    "livekit>=1.1.8",
    "livekit-agents>=1.5.14",
    "livekit-api>=1.1.0",
    "livekit-blingfire>=1.1.0",
    "livekit-plugins-cartesia>=1.5.14",
    "livekit-plugins-deepgram>=1.5.14",
    "livekit-plugins-elevenlabs>=1.5.14",
    "livekit-plugins-noise-cancellation>=0.2.5",
    "livekit-plugins-openai>=1.5.14",
    "livekit-plugins-sarvam>=1.5.14",
    "livekit-plugins-silero>=1.5.14",
    "livekit-protocol>=1.1.2",
    # ── LLM / AI ──
    "openai>=2.21.0",
    "anthropic>=0.84.0",
    "tiktoken>=0.12.0",
    # ── STT/TTS ──
    "sarvamai>=0.1.25",
    # ── Web / HTTP ──
    "fastapi>=0.129.2",
    "uvicorn>=0.41.0",
    "httpx>=0.28.1",
    "requests>=2.32.5",
    "starlette>=0.52.1",
    # ── Database (Supabase) ──
    "supabase>=2.28.0",
    "postgrest>=2.28.0",
